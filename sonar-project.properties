sonar.projectKey=stephenlclarke_mac-sync
sonar.organization=stephenlclarke
sonar.host.url=https://sonarcloud.io
sonar.projectName=mac-sync
sonar.projectVersion=0.1.0

sonar.sources=Sources
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.exclusions=.build/**,dist/**,**/.swiftpm/**,Tools/**,tests/**
sonar.coverage.exclusions=Package.swift,Sources/MacSyncCLI/**,Sources/MacSyncSpinner/**,Sources/MacSyncCore/MacSyncCore.swift,tests/**
sonar.coverageReportPaths=coverage.xml
sonar.qualitygate.wait=true

sonar.issue.ignore.multicriteria=s1075Swift,shellTests,pythonPath,pythonConstruct
sonar.issue.ignore.multicriteria.s1075Swift.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.s1075Swift.resourceKey=**/*.swift
sonar.issue.ignore.multicriteria.shellTests.ruleKey=shelldre:S1192
sonar.issue.ignore.multicriteria.shellTests.resourceKey=tests/**/*.sh
sonar.issue.ignore.multicriteria.pythonPath.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.pythonPath.resourceKey=Tools/**/*.py
sonar.issue.ignore.multicriteria.pythonConstruct.ruleKey=pythonsecurity:S6549
sonar.issue.ignore.multicriteria.pythonConstruct.resourceKey=Tools/**/*.py

name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout mac-sync
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
          config-file: .github/codeql/codeql-config.yml

      - name: Build Swift package for CodeQL
        timeout-minutes: 15
        run: make build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

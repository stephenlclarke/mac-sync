name: Homebrew

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout mac-sync
        uses: actions/checkout@v7

      - name: Render formula fixtures
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Formula
          python3 Tools/release/update-homebrew-formula.py \
            --formula Formula/mac-sync.rb \
            --template Tools/release/mac-sync.rb.in \
            --formula-class MacSync \
            --formula-name mac-sync \
            --url https://example.invalid/mac-sync-release-arm64.tar.gz \
            --version 0.1.0 \
            --asset mac-sync-release-arm64.tar.gz \
            --label stable \
            --sha256 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            --conflicts-with mac-sync-current
          python3 Tools/release/update-homebrew-formula.py \
            --formula Formula/mac-sync-current.rb \
            --template Tools/release/mac-sync.rb.in \
            --formula-class MacSyncCurrent \
            --formula-name mac-sync-current \
            --url https://example.invalid/mac-sync-current-0123456789ab-arm64.tar.gz \
            --version current.1.0123456789ab \
            --asset mac-sync-current-0123456789ab-arm64.tar.gz \
            --label current \
            --sha256 bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb \
            --conflicts-with mac-sync

      - name: Validate formulae
        shell: bash
        run: |
          set -euo pipefail
          for formula in Formula/*.rb; do
            ruby -c "$formula"
            brew style "$formula"
            brew info --formula "$formula"
          done
